<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Event</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="add-event.css">
</head>
<body>

  <div class="container">
    <h1>Add New Event</h1>

    <form id="add-form">
      <input type="text" id="title" placeholder="Event Title" required>
      <textarea id="description" placeholder="Event Description" required></textarea>
      <input type="date" id="date" required>
      <input type="time" id="time" required>
      <input type="text" id="location" placeholder="Location" required>
      <input type="text" id="category" placeholder="Category (e.g., Academic, Social)" required>
      <input type="url" id="image" placeholder="Image URL" required>
      <button type="submit" class="btn-primary">Submit Event</button>
    </form>
  </div>

  <script src="add-event.js"></script>
</body>

</html>
